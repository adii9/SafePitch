pitch_deck_extraction_task:
  description: >
    Analyze the {pitch_deck_content} and {email_body} for {company_name} to extract all data requested
    in the following fields:
    KYC Fields: {dynamic_kyc_fields}
    Financial Fields: {dynamic_financial_fields}
    Market Fields: {dynamic_market_fields}

    If a field is not present in the deck, write "Not stated".
    Focus ONLY on the provided documents. Do not search the web.
  expected_output: >
    A JSON object containing the extracted data exactly as claimed in the pitch deck.
  agent: extraction_specialist

internet_verification_task:
  description: >
    Take the claims extracted in the previous task for {company_name} and verify them.
    1. Search the web targeting sites like Tracxn, PitchBook, and VCCEdge. If paywalled, use general web searches.
    2. Override "Not stated" fields if you find the actual data online.
    3. You MUST attach the exact Source URL where you verified or found EACH data point. 
    Instead of a flat list, structure each point as an object with 'value' and 'source_url'.
  expected_output: >
    A JSON object where each key maps to an object like: {{"value": "the data", "source_url": "the link"}}.
  agent: osint_investigator
  context:
    - pitch_deck_extraction_task

discrepancy_analysis_task:
  description: >
    Compare the initial Pitch Deck Claims against the Web Verified Data for {company_name}.
    Note that the Web Verified Data will have a {"value": ..., "source_url": ...} structure. You should compare against the 'value'.
    Generate two lists:
    - Red Flags: Where internet data contradicts the pitch deck (e.g. false claims, inflated metrics, missing registrations).
    - Green Flags: Verified strong points (e.g. verified founder exits, strong verified traction).
  expected_output: >
    A JSON object with two arrays: "red_flags" and "green_flags".
  agent: risk_analyst
  context:
    - pitch_deck_extraction_task
    - internet_verification_task

startup_rating_task:
  description: >
    Review all gathered data, red flags, and green flags for {company_name}.
    Then, evaluate the startup based on the following VC Rating Criteria:
    {rating_criteria}

    Calculate the numerical score based on the weights/points in the criteria.
    Provide the final score and a paragraph explaining the reasoning for the score.
  expected_output: >
    A JSON object with "score" (number) and "reasoning" (string).
  agent: ic_scoring_agent
  context:
    - pitch_deck_extraction_task
    - internet_verification_task
    - discrepancy_analysis_task

final_consolidation_task:
  description: >
    Merge all the information gathered across tasks into one final JSON object.
    It must contain the following top-level keys:
    1. "extracted_deck_data": The original claims from the deck.
    2. "internet_verified_data": The fact-checked data, where EVERY key maps to an object containing "value" and "source_url".
    3. "risk_analysis": The red and green flags.
    4. "scoring": The final numerical score and reasoning.
  expected_output: >
    A comprehensive, unified JSON object containing the extracted data, verified data (with nested sources), flags, score, and reasoning.
  agent: extraction_specialist
  context:
    - pitch_deck_extraction_task
    - internet_verification_task
    - discrepancy_analysis_task
    - startup_rating_task