kyc_onboarding_task:
  description: >
    Analyze the {pitch_deck_content} and {email_body} to extract identity and administrative details
    for {company_name}.

    CRITICAL COMPANY VERIFICATION STEP:
    Before extracting any data, you MUST use your search tools to find the real-world existence of {company_name}.
    Look for an official website, LinkedIn page, or corporate registry.
    If you cannot find any legitimate proof that {company_name} exists in the real world, you MUST immediately abort extraction and return exactly this JSON and nothing else:
    {{"error": "No company with this name found."}}

    If the company DOES exist, proceed to specifically find and verify the following fields:
    {dynamic_kyc_fields}

    If any data is missing in the {pitch_deck_content}, use your search tools to find the
    Company Website and LinkedIn details.

    Extraction rules:
    - Prefer explicit text from the pitch deck (leadership slide, team bios, profiles).
    - If a role is listed without name, do not infer a name.
    - If experience or education is missing for a person, write "Not stated".
  expected_output: >
    A JSON object containing all administrative and company identity data.
  agent: kyc_specialist

financial_extraction_task:
  description: >
    Examine the tables and content in {pitch_deck_content} to extract precise financial performance
    and investment metrics for {company_name}.

    Extract the following specific fields:
    {dynamic_financial_fields}

    Focus heavily on the markdown tables provided by LlamaParse to ensure numerical accuracy.
    If data is not explicitly stated, return "Not stated".
  expected_output: >
    A JSON object containing all financial audit and investment data.
  agent: financial_auditor

market_verification_task:
  description: >
    Verify the market size and competitive landscape for {company_name}.

    DECK-FIRST PROTOCOL (STRICT):
    1. Extract TAM/SAM, market composition, and competitor names directly from the pitch deck
       (e.g., market sizing slide, competitive matrix). These MUST be primary values.
    2. Use Tracxn only to validate competitor intelligence or enrich with valuation/funding.
       Do NOT replace deck-listed competitors with external names.
    3. Use external web searches for TAM/SAM/CAGR ONLY when the deck is missing those fields.
    4. Always tag each market item with Source: "Deck" or "Tracxn".

    Required Fields:
    {dynamic_market_fields}
  expected_output: >
    A JSON object with deck-derived market/competitor data; Tracxn enriches only.
  agent: market_intelligence_analyst

  # Add this at the end of tasks.yaml
final_consolidation_task:
  description: >
    Review all the information gathered for {company_name} across the previous tasks:
    1. Identity/Admin details from the KYC Task.
    2. Financial metrics from the Financial Extraction Task.
    3. Market and Competitive data from the Market Verification Task.

    CRITICAL ERROR CHECK: If the KYC Task returned {{"error": "No company with this name found."}},
    you MUST halt all merging and your final output must be exactly:
    {{"error": "No company with this name found."}}

    Otherwise, your goal is to merge all of this into one single, comprehensive JSON object.
    The keys in the JSON must match the following schema: {excel_schema}.
    Ensure that no data is left behind and that numerical values are formatted correctly.
  expected_output: >
    A single unified JSON object containing all 50+ data points for the VC Master Sheet. Or a JSON object with a single "error" key if the company does not exist.
  agent: market_intelligence_analyst
  context:
    - kyc_onboarding_task
    - financial_extraction_task
    - market_verification_task