name: Deploy to Lambda

# Triggered on push to main. Tests → build → push to ECR → update Lambda
# → smoke-test → auto-rollback on failure.
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID       — IAM user with ECR push + Lambda update perms
#   AWS_SECRET_ACCESS_KEY   — companion secret
#
# Recommended: replace with OIDC (https://github.com/aws-actions/configure-aws-credentials#assuming-a-role-via-oidc)
# once you create an OIDC provider on the AWS account.

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from the Actions tab

concurrency:
  group: deploy-safepitch-minimax
  cancel-in-progress: false  # never cancel a deploy mid-flight; let it finish

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install + test
        # safepitch.models only imports pydantic + typing. No need to
        # install the full crewai/chromadb/lancedb dep tree just to
        # run pure-function tests — that build fails on GH runners
        # (chromadb needs system libs that aren't pre-installed).
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic>=2.0" pytest
          pytest tests/test_truth_scorer.py -v

  build-and-deploy:
    name: Build, Push, Deploy, Smoke Test
    needs: test
    runs-on: ubuntu-latest
    # Only deploy from main, and not from forks (no AWS creds on forks).
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://d36t7grotgwbz5.cloudfront.net/
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Record current production digest (for rollback)
        id: rollback-target
        run: |
          CURRENT=$(aws ecr list-images \
            --repository-name safedeck/minimax \
            --region eu-north-1 \
            --query 'imageIds[?imageTag==`latest`].imageDigest' \
            --output text)
          echo "digest=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "→ Rollback target: $CURRENT"

      - name: Build slim image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Deployment/Dockerfile.slim
          platforms: linux/amd64
          provenance: false
          push: false
          tags: |
            safedeck/minimax:${{ github.sha }}
            safedeck/minimax:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify image locally before pushing
        run: |
          # Sanity check: the image should import the safepitch package
          # and the lambda handler module. Catches the runtime-contract
          # issues we hit on 13 Jun 2026 (WORKDIR, PYTHONPATH, perms).
          docker run --rm \
            safedeck/minimax:${{ github.sha }} \
            python -c "import safepitch.main, lambda_function; print('imports OK')"

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: safedeck/minimax
        run: |
          docker tag safedeck/minimax:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag safedeck/minimax:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "→ Pushed digest for sha ${{ github.sha }}"

      - name: Update Lambda
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: safedeck/minimax
        run: |
          aws lambda update-function-code \
            --function-name safepitch-minimax \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            --region eu-north-1 \
            --query 'LastUpdateStatus' \
            --output text
          aws lambda wait function-updated \
            --function-name safepitch-minimax \
            --region eu-north-1
          echo "→ Lambda updated to sha ${{ github.sha }}"

      - name: Smoke test the new Lambda image
        id: smoke
        # Hits the live Lambda with a tiny test payload. If the cold-start
        # or any of the imports fail, this errors and we roll back.
        run: |
          RESPONSE=$(aws lambda invoke \
            --function-name safepitch-minimax \
            --region eu-north-1 \
            --payload '{"body":"{\"company_name\":\"__gh_smoke__\",\"pitch_deck_content\":\"ci smoke test\",\"tenant_slug\":\"default\"}"}' \
            --cli-binary-format raw-in-base64-out \
            --output json \
            /tmp/smoke_response.json)
          STATUS=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('StatusCode', 0))")
          ERR=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('FunctionError', 'None'))")
          if [ "$STATUS" != "200" ] || [ "$ERR" != "None" ]; then
            echo "::error::Smoke test failed: HTTP $STATUS, FunctionError=$ERR"
            cat /tmp/smoke_response.json
            exit 1
          fi
          # Confirm the verification block is in the response (Task 3).
          if ! python3 -c "import json; d=json.load(open('/tmp/smoke_response.json')); assert 'verification' in d, 'missing verification block'; print('verification block present')"; then
            echo "::error::Smoke response missing 'verification' block — Task 3 regressed?"
            exit 1
          fi
          echo "→ Smoke test passed (HTTP 200, verification block present)"

      - name: Roll back on failure
        if: failure() && steps.rollback-target.outputs.digest != ''
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ROLLBACK_DIGEST: ${{ steps.rollback-target.outputs.digest }}
        run: |
          echo "::error::Deploy failed — rolling back Lambda to previous digest $ROLLBACK_DIGEST"
          aws lambda update-function-code \
            --function-name safepitch-minimax \
            --image-uri $ECR_REGISTRY/safedeck/minimax@$ROLLBACK_DIGEST \
            --region eu-north-1 \
            --query 'LastUpdateStatus' \
            --output text
          aws lambda wait function-updated \
            --function-name safepitch-minimax \
            --region eu-north-1
          echo "→ Rollback complete"

      - name: Deploy summary
        if: success()
        run: |
          echo "## Deploy successful" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.ECR_REGISTRY }}/safedeck/minimax:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Function: safepitch-minimax" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://d36t7grotgwbz5.cloudfront.net/" >> "$GITHUB_STEP_SUMMARY"
