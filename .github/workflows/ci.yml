name: CI

# Run on every push and pull request. Tests the truth_scorer rubric and
# (importantly) confirms the slim Docker image actually builds — the latter
# catches Dockerfile regressions before they reach production.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Truth Scorer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        # safepitch.models only imports pydantic + typing. No need to pull
        # in the full crewai/chromadb/etc. dep tree just to run pure-function
        # tests — that build was failing on GH runners (chromadb needs
        # system libs that aren't pre-installed).
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic>=2.0" pytest

      - name: Run pytest
        # Pin to the specific safe test file rather than the whole tests/
        # directory — there are other test files in tests/ that are
        # gitignored (they contain real API keys) and pytest will try to
        # collect them if pointed at the directory, causing collection
        # errors that mask the real test run.
        run: pytest tests/test_truth_scorer.py -v

  build-slim-image:
    name: Build Slim Lambda Image (sandboxed)
    runs-on: ubuntu-latest
    # Only run on main + PRs targeting main — keeps the build cache hot
    # and avoids running docker on every branch push.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Deployment/Dockerfile.slim
          platforms: linux/amd64
          provenance: false
          push: false
          load: true   # Load the built image into the local daemon so the
                       # 'docker run' verify step below can find it. (Without
                       # this, the image lives in the buildx cache and
                       # 'docker run' fails with "image not found".)
          tags: safedeck/minimax:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify import in built image
        run: |
          # Sanity check: the image should import the safepitch package
          # and we should be able to construct the main crew class.
          # Catches the runtime-contract issues we hit on 13 Jun 2026
          # (WORKDIR, PYTHONPATH, perms, base image).
          #
          # Override the ENTRYPOINT — the Lambda base image's RIE entrypoint
          # expects a handler name as the first arg. For a plain import test
          # we need to bypass it.
          #
          # Set AWS_DEFAULT_REGION — boto3 client construction at module
          # import (in lambda_function.py) needs a region. boto3 reads
          # AWS_DEFAULT_REGION (the SDK-standard var); AWS_REGION alone
          # is not enough.
          docker run --rm --entrypoint="" \
            -e AWS_DEFAULT_REGION=eu-north-1 \
            safedeck/minimax:ci-${{ github.sha }} \
            python -c "import safepitch.main, lambda_function; print('imports OK')"
